<form method="POST" action="{% if form_action %}{{form_action}}{% endif %}" class="px-3 relative">
    {{form.csrf_token }}
    <div class="grid col-2 g-3 pb-3">
        <div class="form-control">
            {{form.name}}
            <label class="spaced-text caps" for="name">{{form.name.label.text}}</label>

        </div>
        <div class="form-control">
            {{form.email}}
            <label class="spaced-text caps" for="email">{{form.email.label.text}}</label>
        </div>
    </div>
    <div class="form-control mb-3">
        {{form.number}}
        <label class="spaced-text caps" for="number">{{form.number.label.text}}</label>
    </div>
    <div class="form-control mb-3">
        {{form.message}}
        <label class="spaced-text caps" for="message">{{form.message.label.text}}</label>
    </div>
    {{ form.recaptcha() }}

        <p class="small-text pt-2">Interested in learning more? Fill out the form and we'll get back to you soon!</p>
    <div class="grid col-2 g-6 mt-3">
        <div>
            
            <button role="submit" class="cta primary">ENQUIRE NOW</button>
        </div>
    </div>
</form>
<div class="spinner" hidden>
                <svg viewBox="0 0 50 50" >
                    <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-dasharray="90 150" stroke-dashoffset="0"/>
                </svg>
</div>
