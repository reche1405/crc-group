        <div class="flex full-width justify-end pr-3">

                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgb(42,42,42)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
        </div>
        {# <img class="nav-logo pt-6 inline-auto" src="/static/img/logo.png" alt="Logo"> #}
        <ul class="px-3 py-3">
            <li><a class="nav-link {% if page and page.tag == 'home' %}nav-link--active{% endif %}" href="{{url_for('main.home')}}">Home</a></li>
            <li><a class="nav-link {% if page and page.tag == 'about' %}nav-link--active{% endif %}" href="{{url_for('main.about')}}">About Us</a></li>
            <li><a class="nav-link {% if page and page.tag == 'services' %}nav-link--active{% endif %}" href="{{url_for('main.service_list')}}">Services</a></li>
            <li><a class="nav-link {% if page and page.tag == 'projects'  %}nav-link--active{% endif %}" href="{{url_for('main.project_list')}}">Projects</a></li>
            <li><a class="nav-link {% if page and page.tag == 'blog' %}nav-link--active{% endif %}" href="{{url_for('main.article_list')}}">Blog</a></li>
            <li><a class="nav-link {% if page and page.tag == 'contact' %}nav-link--active{% endif %}" href="{{url_for('main.contact')}}">Contact</a></li>
        </ul>

        <div class="flex row g-3 justify-center footer-socials">
        {% for link in socials %}
        <a href="{{ link.page_uri }}" target="_blank" rel="noreferrer noopener" style="fill:#ffffff; stroke:#ffffff;">
            {{ link.icon|safe }}
        </a>
        {% endfor %}
        </div>
        
    </div>
</div>
